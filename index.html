<!DOCTYPE html>
<html lang="es" id="html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matix | Bio</title>
    <meta property="og:title" content="Matix | Bio">
    <meta property="og:description" content="Developer & Content Creator">
    <meta property="og:image" content="https://portaldev.tech/avatar.png">
    <meta property="og:url" content="https://portaldev.tech">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Matix | Bio">
    <meta name="twitter:description" content="Developer & Content Creator">
    <meta name="twitter:image" content="https://portaldev.tech/avatar.png">
    <meta name="theme-color" content="#ff4d4d">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <video autoplay muted loop playsinline webkit-playsinline preload="metadata" id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="ui-controls">
        <div class="top-controls">
            <button id="mute-btn" class="control-btn"><i class="fas fa-volume-mute"></i></button>
            <button id="lang-btn" class="control-btn" title="Change language">ES</button>
        </div>
        <div id="music-player" class="music-player-top">
            <iframe src="https://open.spotify.com/embed/playlist/4C0OHAQNX3WgeE2hLogbh1?utm_source=generator" width="260" height="80" frameborder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style="border-radius: 12px;" title="Spotify Player"></iframe>
        </div>
    </div>

    <main class="container">
        <div class="content-wrapper">
            <header class="profile-header">
                <img src="avatar.png" alt="Matix" class="header-icon">
                <h1 class="name">Matix</h1>
                <p class="tagline"><span id="typing-text"></span><span id="cursor" class="cursor">|</span></p>
            </header>

            <div id="discord-card" class="glass-card">
                <div class="discord-content">
                    <span id="status-dot" class="status-dot"></span>
                    <img id="discord-avatar" src="" alt="" class="discord-avatar hidden">
                    <div class="discord-info">
                        <p id="discord-status">Loading Discord Presence...</p>
                        <p id="discord-activity"></p>
                    </div>
                </div>
            </div>

            <div class="social-icons">
                <a href="https://www.youtube.com/channel/UCAeS1v86qjB3tzJRU2dRxNA" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="https://github.com/MatixArg" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://discord.com" target="_blank" title="Discord"><i class="fab fa-discord"></i></a>
            </div>

            <div class="contact">
                <a href="mailto:matix.corporation@outlook.com" class="contact-link">
                    <i class="fas fa-envelope"></i> matix.corporation@outlook.com
                </a>
            </div>
        </div>

        <!-- Skills -->
        <div id="skills" class="skills-section">
            <h2 class="section-title" data-lang="skills">Habilidades</h2>
            <div class="skills-grid">
                <div class="skill-item" data-width="15">
                    <div class="skill-header">
                        <span class="skill-name"><i class="fab fa-js"></i> JavaScript</span>
                        <span class="skill-pct">15%</span>
                    </div>
                    <div class="skill-bar"><div class="skill-fill"></div></div>
                </div>
                <div class="skill-item" data-width="40">
                    <div class="skill-header">
                        <span class="skill-name"><i class="fab fa-python"></i> Python</span>
                        <span class="skill-pct">40%</span>
                    </div>
                    <div class="skill-bar"><div class="skill-fill"></div></div>
                </div>
                <div class="skill-item" data-width="100">
                    <div class="skill-header">
                        <span class="skill-name"><i class="fab fa-discord"></i> Discord Bots</span>
                        <span class="skill-pct">100%</span>
                    </div>
                    <div class="skill-bar"><div class="skill-fill"></div></div>
                </div>
                <div class="skill-item" data-width="85">
                    <div class="skill-header">
                        <span class="skill-name"><i class="fas fa-cube"></i> Minecraft Plugins</span>
                        <span class="skill-pct">85%</span>
                    </div>
                    <div class="skill-bar"><div class="skill-fill"></div></div>
                </div>
                <div class="skill-item" data-width="100">
                    <div class="skill-header">
                        <span class="skill-name"><i class="fas fa-server"></i> Servidores MC</span>
                        <span class="skill-pct">100%</span>
                    </div>
                    <div class="skill-bar"><div class="skill-fill"></div></div>
                </div>
            </div>
        </div>

        <!-- Projects -->
        <div id="projects" class="projects-section">
            <h2 class="section-title" data-lang="projects">Proyectos</h2>
            <div id="projects-grid" class="projects-grid"></div>
        </div>

        <div class="visitor-count">
            <i class="fas fa-eye"></i> <span id="count">0</span>
        </div>
    </main>

    <canvas id="particles"></canvas>
    <canvas id="cursor-canvas"></canvas>

    <script src="script.js" defer></script>
</body>
</html>
